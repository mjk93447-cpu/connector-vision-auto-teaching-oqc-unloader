name: Build Pin Detection EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "pin_detection/**"
      - "run_pin_gui.py"
      - "requirements-pin.txt"
      - "pin_detection_gui.spec"
      - "pin_detection_gui_debug.spec"
      - "tools_scripts/**"
      - ".github/workflows/build-pin-exe.yml"
    tags:
      - "pin-v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-pin.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --quiet torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install --quiet numpy pillow openpyxl scipy matplotlib
          pip install --quiet -r requirements-pin.txt
          pip install --quiet pyinstaller

      - name: Run pin_detection import test
        run: python -c "from pin_detection.gui import main; print('OK')"
      - name: Test EXE stdout fix (NoneType write)
        run: python tools_scripts/test_exe_stdout_fix.py
        working-directory: ${{ github.workspace }}

      - name: Download yolo26n.pt for offline bundle
        run: python -c "from pathlib import Path; from ultralytics.utils.downloads import attempt_download_asset; Path('models').mkdir(exist_ok=True); attempt_download_asset(Path('models')/'yolo26n.pt')"

      - name: Test Action #24 crash fix (frozen workers=0)
        run: python tools_scripts/repro_exe_train_crash.py
        working-directory: ${{ github.workspace }}

      - name: "Generate large factory data (5000x4000, CI 5 imgs)"
        run: python tools_scripts/generate_pin_test_data.py --output-dir test_data/pin_large_factory --large-factory --large-factory-n 5
        working-directory: ${{ github.workspace }}

      - name: "Test EXE large train (5000x4000 roi_map frozen)"
        run: python tools_scripts/test_exe_large_train.py
        working-directory: ${{ github.workspace }}

      - name: Build EXE
        run: python -m PyInstaller --noconfirm --log-level WARN pin_detection_gui.spec

      - name: "Build debug EXE (console for crash diagnosis)"
        run: python -m PyInstaller --noconfirm --log-level WARN pin_detection_gui_debug.spec

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: pin_detection_gui_windows
          path: |
            dist/pin_detection_gui.exe
            dist/pin_detection_gui_debug.exe

      - name: Create Release and upload EXE
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pin_detection_gui.exe
          generate_release_notes: false
          body: "Pin Detection GUI (YOLO26) - Prototype. Tag: ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
